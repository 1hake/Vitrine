version: "3.8"

services:
  vitrine:
    image: thegobc/vitrine:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vitrine-http.rule=Host(`appstoremockup.com`) || Host(`www.appstoremockup.com`)"
      - "traefik.http.routers.vitrine-http.entrypoints=web"
      - "traefik.http.routers.vitrine-http.middlewares=redirect-to-https"
      - "traefik.http.routers.vitrine.rule=Host(`appstoremockup.com`) || Host(`www.appstoremockup.com`)"
      - "traefik.http.routers.vitrine.entrypoints=websecure"
      - "traefik.http.routers.vitrine.tls.certresolver=myresolver"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.services.vitrine.loadbalancer.server.port=80"
    networks:
      - webnet

networks:
  webnet:
    external: true
