# Production Swarm configuration
services:
  web:
    image: thegobc/vitrine:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: stop-first
      labels:
        - 'traefik.enable=true'
        - 'traefik.docker.network=webnet'
        - 'traefik.http.routers.vitrine.rule=Host(`vitrine.gobc.fr`)'
        - 'traefik.http.routers.vitrine.entrypoints=websecure'
        - 'traefik.http.routers.vitrine.tls.certresolver=myresolver'
        - 'traefik.http.services.vitrine.loadbalancer.server.port=80'
    networks:
      - webnet

networks:
  webnet:
    external: true
