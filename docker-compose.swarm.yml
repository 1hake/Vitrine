# Production Swarm configuration
services:
  web:
    image: thegobc/vitrine:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: stop-first
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.vitrine-http.rule=Host(`appstoremockup.com`) || Host(`www.appstoremockup.com`)'
      - 'traefik.http.routers.vitrine-http.entrypoints=web'
      - 'traefik.http.routers.vitrine-http.middlewares=redirect-to-https'
      - 'traefik.http.routers.vitrine.rule=Host(`appstoremockup.com`)'
      - 'traefik.http.routers.vitrine.entrypoints=websecure'
      - 'traefik.http.routers.vitrine.tls.certresolver=myresolver'
      - 'traefik.http.routers.vitrine-www.rule=Host(`www.appstoremockup.com`)'
      - 'traefik.http.routers.vitrine-www.entrypoints=websecure'
      - 'traefik.http.routers.vitrine-www.tls.certresolver=myresolver'
      - 'traefik.http.routers.vitrine-www.middlewares=vitrine-www-redirect'
      - 'traefik.http.middlewares.vitrine-www-redirect.redirectregex.regex=^https?://www\.appstoremockup\.com/(.*)'
      - 'traefik.http.middlewares.vitrine-www-redirect.redirectregex.replacement=https://appstoremockup.com/$${1}'
      - 'traefik.http.middlewares.vitrine-www-redirect.redirectregex.permanent=true'
      - 'traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https'
      - 'traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true'
      - 'traefik.http.services.vitrine.loadbalancer.server.port=80'
    networks:
      - webnet

networks:
  webnet:
    external: true
